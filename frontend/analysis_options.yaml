include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
  language:
    strict-casts: true
    strict-inference: true
  errors:
    # Cosmetic; churn not worth it for v1. Re-enable post-v1 in a dedicated
    # formatting sweep (tracked in POST-V1-BACKLOG "Known lint backlog").
    require_trailing_commas: ignore
    prefer_const_constructors: ignore

linter:
  rules:
    - prefer_const_literals_to_create_immutables
    - prefer_final_locals
    - avoid_print
