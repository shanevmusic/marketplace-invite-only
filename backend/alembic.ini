# Alembic configuration file.
# Used by `alembic` CLI commands.

[alembic]
# Path to migration scripts
script_location = alembic

# Template for new migration filenames.  Keeps them time-ordered and readable.
file_template = %%(rev)s_%%(slug)s

# Timezone for revision timestamps
timezone = UTC

# Log level used by Alembic
# Can be overridden per-command via --log-level
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
