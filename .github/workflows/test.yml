name: test

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    name: backend — pytest (3.12)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: marketplace
          POSTGRES_PASSWORD: marketplace
          POSTGRES_DB: marketplace_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U marketplace"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      APP_ENVIRONMENT: test
      # NOTE: do NOT set APP_DATABASE_URL / APP_DATABASE_URL_SYNC here. backend/tests/conftest.py
      # uses `os.environ.setdefault(...)` to point the app at `marketplace_test` and also
      # drops+recreates that DB per session. Pre-setting these vars makes the app read from
      # a DIFFERENT database than the test fixtures write to (split-brain → 7 ws tests fail).
      # Postgres service DB name above is `marketplace_test` only so the connection has
      # SOMETHING to connect to before conftest runs its drop/create cycle.

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" email-validator

      # No separate `alembic upgrade head` step: backend/tests/conftest.py drops and
      # recreates `marketplace_test` per session and runs migrations itself.

      - name: Run pytest
        working-directory: backend
        run: pytest --junit-xml=test-results.xml -q

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/test-results.xml

  frontend-analyze:
    name: frontend — flutter analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter --version
      - run: flutter pub get
      - run: flutter analyze

  frontend-test:
    name: frontend — flutter test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter test --machine > test-results.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-test-results
          path: frontend/test-results.json

  terraform-validate:
    name: terraform — fmt + validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
      - name: fmt
        working-directory: infra/terraform/aws
        run: terraform fmt -check -recursive
      - name: init (no backend)
        working-directory: infra/terraform/aws
        run: terraform init -backend=false
      - name: validate
        working-directory: infra/terraform/aws
        run: terraform validate
