name: security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Nightly at 03:17 UTC.
    - cron: "17 3 * * *"

jobs:
  gitleaks:
    name: gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pip-audit:
    name: pip-audit (backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend + pip-audit
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e . pip-audit
      - name: Run pip-audit
        working-directory: backend
        run: pip-audit -s osv --progress-spinner off

  flutter-outdated:
    name: flutter pub outdated
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter pub outdated --json > outdated.json || true
      - uses: actions/upload-artifact@v4
        with:
          name: flutter-outdated
          path: frontend/outdated.json
