name: security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Nightly at 03:17 UTC.
    - cron: "17 3 * * *"

jobs:
  gitleaks:
    name: gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pip-audit:
    name: pip-audit (backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend + pip-audit
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e . pip-audit
      - name: Run pip-audit
        working-directory: backend
        # Ignore CVE-2024-23342 (ecdsa Minerva timing side-channel): no upstream fix,
        # transitive via python-jose[cryptography]. Not in our v1 threat model (attacker
        # cannot control sign-operation timing on chosen data). Tracked in POST-V1-BACKLOG
        # for v1.1 migration to PyJWT.
        run: pip-audit -s osv --progress-spinner off --ignore-vuln CVE-2024-23342

  flutter-outdated:
    name: flutter pub outdated
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter pub outdated --json > outdated.json || true
      - uses: actions/upload-artifact@v4
        with:
          name: flutter-outdated
          path: frontend/outdated.json
