name: security

on:
  pull_request:
  push:
    branches: [main]

jobs:
  gitleaks:
    name: gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Phase 12 — no custom config yet; the action's defaults match
          # the baseline ruleset we want.
